{% extends 'base.html' %}
{% load static %}

{% block title %}Envoyer un message - Zãmsɛ{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <h2 class="fw-bold mb-3">Envoyer un message</h2>
          <p class="text-muted mb-4">À : <strong>{{ destinataire.get_full_name|default:destinataire.username }}</strong></p>
          
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Message</label>
              <textarea name="contenu" class="form-control rounded-3" rows="5" required></textarea>
            </div>
            <div class="d-flex gap-2">
              <a href="{% url 'boite_reception' %}" class="btn btn-light rounded-pill px-4">Annuler</a>
              <button type="submit" class="btn btn-primary rounded-pill px-4">Envoyer</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifier un enfant - Zãmsɛ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #eef2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card-custom {
      max-width: 500px;
      width: 100%;
      border-radius: 28px;
      border: none;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1);
    }
    .btn-cancel {
      background: #f1f5f9;
      color: #475569;
      border: none;
      border-radius: 40px;
      padding: 0.6rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-cancel:hover {
      background: #e2e8f0;
    }
    .btn-submit {
      background: #e3b23c;
      color: #0f2b4b;
      border: none;
      border-radius: 40px;
      padding: 0.6rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-submit:hover {
      background: #c49a1f;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<div class="card-custom">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <div class="bg-warning bg-opacity-10 d-inline-flex p-3 rounded-4 mb-3">
        <i class="bi bi-pencil-square fs-1 text-warning"></i>
      </div>
      <h2 class="fw-bold">Modifier un enfant</h2>
      <p class="text-muted">Modifiez les informations de votre enfant</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Prénom</label>
        <input type="text" name="prenom" class="form-control rounded-3" value="{{ enfant.prenom }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nom</label>
        <input type="text" name="nom" class="form-control rounded-3" value="{{ enfant.nom }}" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Niveau scolaire</label>
        <select name="niveau_scolaire" class="form-select rounded-3">
          <option value="">Sélectionner un niveau</option>
          {% for niveau in niveaux %}
            <option value="{{ niveau.nom }}" {% if enfant.niveau_scolaire == niveau.nom %}selected{% endif %}>
              {{ niveau.nom }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <a href="{% url 'dashboard' %}" class="btn-cancel flex-grow-1 text-center text-decoration-none">Annuler</a>
        <button type="submit" class="btn-submit flex-grow-1">Modifier</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supprimer un enfant - Zãmsɛ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #eef2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card-custom {
      max-width: 500px;
      width: 100%;
      border-radius: 28px;
      border: none;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1);
    }
    .btn-cancel {
      background: #f1f5f9;
      color: #475569;
      border: none;
      border-radius: 40px;
      padding: 0.6rem;
      font-weight: 500;
    }
    .btn-cancel:hover {
      background: #e2e8f0;
    }
    .btn-danger-custom {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 0.6rem;
      font-weight: 600;
    }
    .btn-danger-custom:hover {
      background: #b91c1c;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<div class="card-custom">
  <div class="card-body p-4 text-center">
    <div class="bg-danger bg-opacity-10 d-inline-flex p-3 rounded-4 mb-3">
      <i class="bi bi-exclamation-triangle-fill fs-1 text-danger"></i>
    </div>
    <h2 class="fw-bold mb-3">Supprimer un enfant</h2>
    <p class="text-muted mb-4">
      Êtes-vous sûr de vouloir supprimer <strong>{{ enfant.prenom }} {{ enfant.nom }}</strong> ?
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a href="{% url 'dashboard' %}" class="btn-cancel flex-grow-1 text-center text-decoration-none">Annuler</a>
        <button type="submit" class="btn-danger-custom flex-grow-1">Supprimer</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
